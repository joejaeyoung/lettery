name: Docker Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./letter
          file: ./letter/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lettery-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lettery-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./culetter-react
          file: ./culetter-react/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE=/v1
            VITE_KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            VITE_KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lettery-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lettery-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to NCP Server
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          BASE_URL: ${{ secrets.BASE_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: DOCKERHUB_USERNAME,DB_URL,DB_USERNAME,DB_PASSWORD,JWT_SECRET,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_REDIRECT_URI,BASE_URL
          script: |
            docker pull $DOCKERHUB_USERNAME/lettery-backend:latest
            docker pull $DOCKERHUB_USERNAME/lettery-frontend:latest

            docker network inspect lettery-network >/dev/null 2>&1 || docker network create lettery-network

            docker stop backend frontend 2>/dev/null || true
            docker rm backend frontend 2>/dev/null || true

            docker run -d \
              --name backend \
              --network lettery-network \
              -p 8080:8080 \
              -e DB_URL=$DB_URL \
              -e DB_USERNAME=$DB_USERNAME \
              -e DB_PASSWORD=$DB_PASSWORD \
              -e JWT_SECRET=$JWT_SECRET \
              -e KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID \
              -e KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET \
              -e KAKAO_REDIRECT_URI=$KAKAO_REDIRECT_URI \
              -e BASE_URL=$BASE_URL \
              --restart unless-stopped \
              $DOCKERHUB_USERNAME/lettery-backend:latest

            docker run -d \
              --name frontend \
              --network lettery-network \
              -p 80:80 \
              --restart unless-stopped \
              $DOCKERHUB_USERNAME/lettery-frontend:latest

            docker image prune -f
